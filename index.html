<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SETPACK</title>
<meta name="description" content="SETPACK — 2D lighting and production planning for iPad.">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65;
    color: #1a1a1a;
    background: #fafafa;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 12vh 24px 10vh; }
  h1 { font-size: 2.4rem; letter-spacing: 0.06em; margin: 0 0 0.2em; font-weight: 700; }
  .tag { color: #666; font-size: 1.05rem; margin: 0 0 2.4em; }
  nav { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 2.4em; }
  nav a {
    display: inline-block; padding: 10px 18px; border: 1px solid #ccc;
    border-radius: 10px; text-decoration: none; color: #1a1a1a; font-weight: 500;
  }
  nav a:hover { border-color: #1a1a1a; }
  .contact { color: #666; font-size: 0.95rem; }
  .contact a { color: inherit; }
  footer { margin-top: 4em; color: #999; font-size: 0.85rem; }
  @media (prefers-color-scheme: dark) {
    body { color: #eaeaea; background: #111; }
    .tag, .contact { color: #999; }
    nav a { border-color: #333; color: #eaeaea; }
    nav a:hover { border-color: #eaeaea; }
    footer { color: #666; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>SETPACK</h1>
    <p class="tag">2D lighting &amp; production planning for iPad.</p>
    <nav>
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Use</a>
    </nav>
    <p class="contact">Contact: <a href="mailto:support@setpack.app">support@setpack.app</a></p>
    <footer>&copy; SETPACK</footer>
  </main>
</body>
</html>
